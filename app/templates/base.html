<!DOCTYPE html>
<html>
<head>
    <title>Hostel Booking</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #F5F5F5; }
        nav { background: #003893; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; color: #FFD700; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #003893; color: white; }
        form input, form select, form button { padding: 8px; margin: 5px 0; display: block; width: 100%; max-width: 300px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #DC143C; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #B01030; }
        .error { color: #DC143C; }
        .success { color: #1E7B34; }
        h1 { color: #003893; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/hostels-page">Hostels</a>
        <a href="/rooms-page">Rooms</a>
        <a href="/bookings-page">Bookings</a>
        <a href="/login-page">Login</a>
        <a href="/register-page">Register</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
